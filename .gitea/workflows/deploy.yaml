name: Deploy to HP Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: node:20-bullseye
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 192.168.1.125 >> ~/.ssh/known_hosts
          ssh thomas@192.168.1.125 "cd /home/thomas/opencode && git checkout master && git pull origin master && /home/thomas/.bun/bin/bun install && sudo systemctl restart opencode-web"
